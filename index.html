<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calcolo del prezzo del biglietto del treno</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <main>
        <form action="">
            <section>
                <h2>Compra biglietto</h2>
            </section>
            <section>
                <div>
                    <label class="form-label">L'età del passeggero</label>
                    <input id="eta-field" class="form-control" placeholder="Inserisci l'età del passeggero">
                </div>
                <div>
                    <label class="form-label">Distanza</label>
                    <input id="km-field" class="form-control" placeholder="Inserisci km">
                </div>
                <div>
                    <button id="calc-btn">Calcola</button>
                </div>
            </section>
        </form>

    </main>
    <script defer src="./main,js"></script>
</body>
</html>
